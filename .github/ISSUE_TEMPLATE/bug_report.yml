name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open FFDOWNLOADER
        2. Add links
        3. Press Start
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "1.0.0"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Attach relevant lines from data/ffdownloader.log if available.

