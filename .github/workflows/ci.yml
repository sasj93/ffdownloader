name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore FFDownloader.sln

      - name: Test
        run: dotnet test tests\FFDownloader.Core.Tests\FFDownloader.Core.Tests.csproj --configuration Release --no-restore

      - name: Build app
        run: dotnet build src\FFDownloader.App\FFDownloader.App.csproj --configuration Release --no-restore

